<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Footballers Elite Hub | Messi & Ronaldo | Live Action</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a1f0a 0%, #1a3a1a 30%, #2d1b4e 70%, #1a0a2e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background particles */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 20%, rgba(0, 255, 100, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(147, 51, 234, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(34, 197, 94, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    /* Main container */
    .hub-container {
      max-width: 1100px;
      width: 100%;
      background: rgba(10, 20, 10, 0.75);
      backdrop-filter: blur(30px);
      border-radius: 3rem;
      padding: 2rem;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.8),
        0 0 0 2px rgba(34, 197, 94, 0.4),
        0 0 0 4px rgba(147, 51, 234, 0.3),
        0 0 80px rgba(34, 197, 94, 0.3),
        0 0 120px rgba(147, 51, 234, 0.2);
      border: 2px solid rgba(34, 197, 94, 0.5);
      position: relative;
      z-index: 2;
      animation: containerGlow 3s ease-in-out infinite alternate;
    }

    @keyframes containerGlow {
      0% { box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 2px rgba(34,197,94,0.4), 0 0 80px rgba(34,197,94,0.3); }
      100% { box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 2px rgba(147,51,234,0.5), 0 0 100px rgba(147,51,234,0.4); }
    }

    /* Header with player images */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin: -2rem -2rem 2rem -2rem;
      padding: 1.5rem 2rem;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(147, 51, 234, 0.2));
      border-radius: 3rem 3rem 2rem 2rem;
      border-bottom: 2px solid rgba(147, 51, 234, 0.5);
      backdrop-filter: blur(20px);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      font-size: 2.8rem;
      color: #22c55e;
      filter: drop-shadow(0 0 15px #22c55e) drop-shadow(0 0 30px #9333ea);
      animation: iconPulse 2s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px #22c55e); }
      50% { transform: scale(1.1); filter: drop-shadow(0 0 25px #9333ea); }
    }

    .logo-text {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #22c55e, #9333ea, #22c55e);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 3s ease infinite;
      text-transform: uppercase;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .logo-text span {
      font-size: 0.85rem;
      display: block;
      letter-spacing: 2px;
    }

    /* Player showcase cards */
    .players-showcase {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .player-card {
      background: linear-gradient(145deg, rgba(34, 197, 94, 0.15), rgba(147, 51, 234, 0.15));
      border-radius: 2rem;
      padding: 1.5rem;
      border: 2px solid rgba(147, 51, 234, 0.4);
      backdrop-filter: blur(15px);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .player-card:hover {
      transform: translateY(-5px);
      border-color: #22c55e;
      box-shadow: 0 20px 40px rgba(34, 197, 94, 0.3);
    }

    .player-card::before {
      content: "";
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .player-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 1.5rem;
      margin-bottom: 1rem;
      border: 2px solid rgba(147, 51, 234, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
    }

    .player-card:hover .player-image {
      border-color: #22c55e;
      box-shadow: 0 15px 40px rgba(34, 197, 94, 0.4);
    }

    .player-stats {
      display: flex;
      justify-content: space-around;
      margin: 1rem 0;
      padding: 0.8rem;
      background: rgba(0,0,0,0.3);
      border-radius: 1rem;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #22c55e, #9333ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      color: #a3a3a3;
      font-size: 0.8rem;
    }

    .player-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: white;
      text-align: center;
      margin: 0.5rem 0;
    }

    /* Live match section */
    .live-match {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(147, 51, 234, 0.2));
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 2px solid rgba(147, 51, 234, 0.3);
      backdrop-filter: blur(20px);
    }

    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .live-badge {
      background: #22c55e;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 1rem;
      font-weight: 700;
      animation: livePulse 1s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .match-score {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      font-size: 2.5rem;
      font-weight: 900;
      color: white;
    }

    .team {
      text-align: center;
    }

    .team-name {
      font-size: 1rem;
      color: #22c55e;
      margin-bottom: 0.5rem;
    }

    /* Experience form */
    .experience-form {
      background: rgba(0,0,0,0.3);
      border-radius: 2rem;
      padding: 1.5rem;
      margin: 2rem 0;
      border: 2px solid rgba(147, 51, 234, 0.3);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .experience-form input,
    .experience-form textarea {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(147, 51, 234, 0.5);
      background: rgba(0,0,0,0.5);
      color: white;
      outline: none;
      font-family: inherit;
      transition: all 0.3s;
    }

    .experience-form input:focus,
    .experience-form textarea:focus {
      border-color: #22c55e;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
    }

    .btn-post {
      background: linear-gradient(135deg, #22c55e, #9333ea);
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(147, 51, 234, 0.5);
    }

    .btn-post:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.5);
    }

    /* Experiences list */
    .experiences-list {
      max-height: 400px;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .experience-item {
      background: rgba(0,0,0,0.3);
      border-radius: 1.5rem;
      padding: 1.2rem;
      margin-bottom: 1rem;
      border-left: 4px solid #22c55e;
      transition: all 0.3s;
    }

    .experience-item:hover {
      border-left-color: #9333ea;
      background: rgba(147, 51, 234, 0.1);
    }

    .exp-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.5rem;
    }

    .exp-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #9333ea);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    .exp-name {
      font-weight: 700;
      color: #22c55e;
    }

    .exp-time {
      color: #6b7280;
      font-size: 0.8rem;
    }

    .exp-message {
      color: #d1d5db;
      margin-top: 0.5rem;
    }

    .exp-actions {
      display: flex;
      gap: 1rem;
      margin-top: 0.8rem;
    }

    .btn-action {
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .btn-action:hover {
      color: #22c55e;
    }

    .btn-like.active {
      color: #22c55e;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hub-container {
        padding: 1rem;
        border-radius: 2rem;
      }
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
      .match-score {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="hub-container">
    <!-- Header -->
    <div class="header">
      <div class="logo-area">
        <i class="fas fa-futbol logo-icon"></i>
        <div class="logo-text">
          Elite Footballers<span>Messi & Ronaldo Era</span>
        </div>
      </div>
      <div style="display: flex; gap: 1rem; color: white; font-weight: 600;">
        <span style="background: rgba(34,197,94,0.3); padding: 0.5rem 1rem; border-radius: 1rem;">
          <i class="fas fa-fire"></i> Trending
        </span>
        <span style="background: rgba(147,51,234,0.3); padding: 0.5rem 1rem; border-radius: 1rem;">
          <i class="fas fa-trophy"></i> GOATs
        </span>
      </div>
    </div>

    <!-- Messi & Ronaldo Showcase -->
    <div class="players-showcase">
      <!-- Messi Card -->
      <div class="player-card">
        <img 
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Lionel-Messi-Argentina-2022-FIFA-World-Cup_%28cropped%29.jpg/800px-Lionel-Messi-Argentina-2022-FIFA-World-Cup_%28cropped%29.jpg" 
          alt="Lionel Messi" 
          class="player-image"
          onerror="this.src='https://via.placeholder.com/400x200/22c55e/ffffff?text=Messi'"
        >
        <div class="player-name">Lionel Messi 🇦🇷</div>
        <div class="player-stats">
          <div class="stat-item">
            <div class="stat-value" id="messiGoals">821</div>
            <div class="stat-label">Goals</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">361</div>
            <div class="stat-label">Assists</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">8</div>
            <div class="stat-label">Ballon d'Or</div>
          </div>
        </div>
        <button onclick="updateStats('messi')" style="width:100%; padding:0.5rem; background: linear-gradient(135deg, #22c55e, #9333ea); border:none; border-radius:1rem; color:white; font-weight:700; cursor:pointer;">
          <i class="fas fa-plus-circle"></i> Add Goal
        </button>
      </div>

      <!-- Ronaldo Card -->
      <div class="player-card">
        <img 
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Cristiano_Ronaldo_playing_for_Al_Nassr_FC_against_Persepolis%2C_September_2023_%28cropped%29.jpg/800px-Cristiano_Ronaldo_playing_for_Al_Nassr_FC_against_Persepolis%2C_September_2023_%28cropped%29.jpg" 
          alt="Cristiano Ronaldo" 
          class="player-image"
          onerror="this.src='https://via.placeholder.com/400x200/9333ea/ffffff?text=Ronaldo'"
        >
        <div class="player-name">Cristiano Ronaldo 🇵🇹</div>
        <div class="player-stats">
          <div class="stat-item">
            <div class="stat-value" id="ronaldoGoals">873</div>
            <div class="stat-label">Goals</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">254</div>
            <div class="stat-label">Assists</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">5</div>
            <div class="stat-label">Ballon d'Or</div>
          </div>
        </div>
        <button onclick="updateStats('ronaldo')" style="width:100%; padding:0.5rem; background: linear-gradient(135deg, #9333ea, #22c55e); border:none; border-radius:1rem; color:white; font-weight:700; cursor:pointer;">
          <i class="fas fa-plus-circle"></i> Add Goal
        </button>
      </div>
    </div>

    <!-- Live Match Section -->
    <div class="live-match">
      <div class="match-header">
        <h3 style="color: white;"><i class="fas fa-futbol"></i> Live Match</h3>
        <span class="live-badge"><i class="fas fa-circle"></i> LIVE</span>
      </div>
      <div class="match-score">
        <div class="team">
          <div class="team-name">Inter Miami</div>
          <div style="font-size: 2rem;" id="teamAScore">2</div>
        </div>
        <div style="color: #9333ea;">VS</div>
        <div class="team">
          <div class="team-name">Al Nassr</div>
          <div style="font-size: 2rem;" id="teamBScore">2</div>
        </div>
      </div>
      <div style="text-align: center; margin-top: 1rem;">
        <button onclick="updateMatchScore()" style="background: rgba(147,51,234,0.3); border: 1px solid #9333ea; color: white; padding: 0.5rem 1.5rem; border-radius: 1rem; cursor: pointer;">
          <i class="fas fa-sync-alt"></i> Update Score
        </button>
      </div>
    </div>

    <!-- Experience Sharing -->
    <div style="color: white; margin: 1.5rem 0;">
      <h2><i class="fas fa-comments" style="color: #22c55e;"></i> Players' Experiences</h2>
    </div>

    <div class="experience-form">
      <input type="text" id="playerName" placeholder="Your name" maxlength="30">
      <textarea id="experienceText" rows="2" placeholder="Share your football moment..."></textarea>
      <button class="btn-post" onclick="addExperience()">
        <i class="fas fa-paper-plane"></i> Post
      </button>
    </div>

    <div class="experiences-list" id="experiencesContainer">
      <!-- Dynamic content -->
    </div>
  </div>

  <script>
    // Real action functionality
    let messiGoals = 821;
    let ronaldoGoals = 873;
    let teamAScore = 2;
    let teamBScore = 2;
    let experiences = JSON.parse(localStorage.getItem('football_experiences')) || [];

    // Initialize with some real experiences
    if (experiences.length === 0) {
      experiences = [
        {
          id: 1,
          name: "Football Fan",
          message: "Messi's World Cup win was the greatest moment in football history! 🐐",
          timestamp: new Date(Date.now() - 3600000).toISOString(),
          likes: 47,
          liked: false
        },
        {
          id: 2,
          name: "CR7 Fan",
          message: "Ronaldo's bicycle kick against Juventus is still the best goal ever! 🔥",
          timestamp: new Date(Date.now() - 7200000).toISOString(),
          likes: 38,
          liked: false
        }
      ];
      saveExperiences();
    }

    function saveExperiences() {
      localStorage.setItem('football_experiences', JSON.stringify(experiences));
    }

    function updateStats(player) {
      if (player === 'messi') {
        messiGoals++;
        document.getElementById('messiGoals').textContent = messiGoals;
        // Animate
        document.getElementById('messiGoals').style.transform = 'scale(1.5)';
        setTimeout(() => {
          document.getElementById('messiGoals').style.transform = 'scale(1)';
        }, 300);
      } else {
        ronaldoGoals++;
        document.getElementById('ronaldoGoals').textContent = ronaldoGoals;
        document.getElementById('ronaldoGoals').style.transform = 'scale(1.5)';
        setTimeout(() => {
          document.getElementById('ronaldoGoals').style.transform = 'scale(1)';
        }, 300);
      }
    }

    function updateMatchScore() {
      const random = Math.random();
      if (random < 0.5) {
        teamAScore++;
        document.getElementById('teamAScore').textContent = teamAScore;
      } else {
        teamBScore++;
        document.getElementById('teamBScore').textContent = teamBScore;
      }
      
      // Flash effect
      const scoreElement = random < 0.5 ? document.getElementById('teamAScore') : document.getElementById('teamBScore');
      scoreElement.style.color = '#22c55e';
      scoreElement.style.transform = 'scale(1.5)';
      setTimeout(() => {
        scoreElement.style.color = 'white';
        scoreElement.style.transform = 'scale(1)';
      }, 500);
    }

    function addExperience() {
      const name = document.getElementById('playerName').value.trim();
      const message = document.getElementById('experienceText').value.trim();
      
      if (!name || !message) {
        alert('Please fill in both fields');
        return;
      }

      const newExp = {
        id: Date.now(),
        name: name,
        message: message,
        timestamp: new Date().toISOString(),
        likes: 0,
        liked: false
      };

      experiences.unshift(newExp);
      saveExperiences();
      renderExperiences();
      
      document.getElementById('playerName').value = '';
      document.getElementById('experienceText').value = '';
    }

    function likeExperience(id) {
      const exp = experiences.find(e => e.id === id);
      if (exp) {
        if (!exp.liked) {
          exp.likes++;
          exp.liked = true;
        } else {
          exp.likes--;
          exp.liked = false;
        }
        saveExperiences();
        renderExperiences();
      }
    }

    function getTimeAgo(timestamp) {
      const now = new Date();
      const past = new Date(timestamp);
      const diff = Math.floor((now - past) / 1000);
      
      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return past.toLocaleDateString();
    }

    function renderExperiences() {
      const container = document.getElementById('experiencesContainer');
      container.innerHTML = '';
      
      experiences.forEach(exp => {
        const div = document.createElement('div');
        div.className = 'experience-item';
        div.innerHTML = `
          <div class="exp-header">
            <div class="exp-avatar">${exp.name[0].toUpperCase()}</div>
            <div>
              <div class="exp-name">${exp.name}</div>
              <div class="exp-time">${getTimeAgo(exp.timestamp)}</div>
            </div>
          </div>
          <div class="exp-message">${exp.message}</div>
          <div class="exp-actions">
            <button class="btn-action btn-like ${exp.liked ? 'active' : ''}" onclick="likeExperience(${exp.id})">
              <i class="fas fa-heart"></i> ${exp.likes}
            </button>
            <button class="btn-action">
              <i class="fas fa-share"></i> Share
            </button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Auto-update match time
    setInterval(() => {
      const liveBadge = document.querySelector('.live-badge');
      if (liveBadge) {
        liveBadge.style.opacity = liveBadge.style.opacity === '0.5' ? '1' : '0.5';
      }
    }, 1000);

    // Initial render
    renderExperiences();

    // Add keyboard shortcut for posting
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        addExperience();
      }
    });
  </script>
</body>
</html>
